[tox]
envlist =
	py{310,311,312,313,314}
	lint
skip_missing_interpreters = True

[gh-actions]
	3.10: py310
	3.11: py311
	3.12: py312
	3.13: py313
	3.14: py314

[testenv]
deps=
	aiohttp
	check-manifest
	flake8
	flake8-import-order
	pytest
	pytest-cache
	pytest-cov
commands =
	pip wheel --no-deps -w dist .
	test: pytest -v
	check-manifest
	lint: flake8 cs tests.py
